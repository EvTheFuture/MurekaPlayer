name: Purge jsDelivr cache

# Fire whenever a release is published
on:
  release:
    types: [published]

jobs:
  purge:
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Purge player.js on jsDelivr
        run: |
          curl -fsSL --retry 3 --retry-delay 5 \
            "https://purge.jsdelivr.net/gh/${{ github.repository }}@latest/src/player.js"
